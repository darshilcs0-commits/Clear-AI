<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear.AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* Minimalistic Dark Mode UI (Gemini Style) */
        body {
            background-color: #131314;
            color: #e3e3e3;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Header */
        .header {
            padding: 15px 20px;
            font-size: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }
        .logo { font-size: 24px; color: #8ab4f8; }

        /* Chat Area */
        .chat-container {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #444 #131314;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .bot-message {
            background-color: #1e1f20;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #e3e3e3;
        }

        .user-message {
            background-color: #2b2b2b;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* 🚨 DEATHLY HALLOWS ANIMATED LOADER 🚨 */
        .deathly-hallows-loader {
            display: none;
            align-self: flex-start;
            background-color: #1e1f20;
            padding: 15px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            justify-content: center;
            align-items: center;
        }

        .deathly-hallows-icon {
            font-size: 30px; 
            color: #8ab4f8; 
            animation: hallows-pulse 1.5s ease-in-out infinite; 
        }

        @keyframes hallows-pulse {
            0% { transform: scale(1); opacity: 0.5; text-shadow: 0 0 5px #8ab4f8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px #8ab4f8; }
            100% { transform: scale(1); opacity: 0.5; text-shadow: 0 0 5px #8ab4f8; }
        }

        /* Input Area */
        .input-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            gap: 10px;
            background-color: #131314;
            position: sticky;
            bottom: 0;
            align-items: center;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 15px 20px;
            border-radius: 30px;
            border: 1px solid #444;
            background-color: #1e1f20;
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #8ab4f8;
        }

        button {
            background-color: #8ab4f8;
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 0 25px;
            height: 48px;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover { 
            background-color: #c2e7ff; 
        }

        /* NAYA: Upload Button aur Image Preview CSS */
        .upload-btn {
            background-color: #1e1f20;
            border: 1px solid #444;
            color: #8ab4f8;
            font-size: 20px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 48px;
        }
        .upload-btn:hover {
            background-color: #2b2b2b;
        }

        .preview-container {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            position: relative;
        }
        .preview-container img {
            max-height: 80px;
            border-radius: 10px;
            border: 2px solid #8ab4f8;
        }
        .remove-img-btn {
            position: absolute;
            top: -5px;
            left: 85px;
            background-color: #ff4d4d;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            padding: 0;
            line-height: 20px;
            text-align: center;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #9aa0a6;
            border-top: 1px solid #333;
            background-color: #131314;
        }
        .footer a { color: #8ab4f8; text-decoration: none; }
        .footer p { margin: 4px 0; }

        /* CODE BOX AUR COPY BUTTON STYLING */
        pre {
            padding: 35px 0px 0px 0px; 
            border-radius: 8px;
            overflow-x: auto;
            position: relative;
            border: 1px solid #333;
            margin-top: 10px;
            background-color: #282c34; 
        }
        pre code.hljs {
            padding: 15px; 
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace;
        }
        p code {
            background-color: #2b2b2b;
            padding: 2px 6px;
            border-radius: 4px;
            color: #ff9800;
            font-family: 'Courier New', Courier, monospace;
        }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            z-index: 10;
        }
        .copy-btn:hover {
            background-color: #8ab4f8;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="logo">◬</span> Clear.AI
    </div>

    <div class="chat-container" id="chat-box">
        <div class="message bot-message">Hey I am Clear, tum bolo toh JEE/NEET bhi karwa duu!</div>
        
        <div class="deathly-hallows-loader" id="loading-indicator">
            <span class="deathly-hallows-icon">◬</span>
        </div>
    </div>
    
    <div class="preview-container" id="preview-container">
        <img id="image-preview" src="" alt="preview">
        <button class="remove-img-btn" onclick="removeImage()">X</button>
    </div>

    <div class="input-container">
       <input type="file" id="image-input" accept="image/*" capture="environment" style="display: none;" onchange="previewImage(event)">
        <button class="upload-btn" onclick="document.getElementById('image-input').click()">📷</button>

        <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" onkeypress="handleKeyPress(event)">
        <button onclick="processInput()">Send</button>
    </div>

    <div class="footer">
        <p>Instagram: <a href="https://instagram.com/darshilsharma.18" target="_blank">@darshilsharma.18</a> | X: <a href="https://twitter.com/darshilcs0" target="_blank">@darshilcs0</a></p>
        <p><i>"agar kuch nayi backchodi hai dimag me toh DM me idea de sakte ho"</i></p>
    </div>

    <script>
        // NAYA: Image store karne ke liye variable
        let base64Image = null;

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                processInput();
            }
        }

        // NAYA: Image select hone pe preview dikhane ke liye
        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Image = e.target.result;
                    document.getElementById('image-preview').src = base64Image;
                    document.getElementById('preview-container').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // NAYA: Preview se image hatane ke liye
        function removeImage() {
            base64Image = null;
            document.getElementById('image-input').value = "";
            document.getElementById('preview-container').style.display = 'none';
        }

        // UPDATE: Text ke sath image bhi chat me dikhane ke liye
        function appendMessage(text, sender, imgData = null) {
            const chatBox = document.getElementById('chat-box');
            const loadingIndicator = document.getElementById('loading-indicator');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            
            // Agar user ne photo bheji hai toh chat box me photo dikhao
            if (sender === 'user' && imgData) {
                const imgElement = document.createElement('img');
                imgElement.src = imgData;
                imgElement.style.maxWidth = '200px';
                imgElement.style.borderRadius = '10px';
                msgDiv.appendChild(imgElement);
            }

            // Agar text bhi hai
            if (text) {
                const textDiv = document.createElement('div');
                if (sender === 'bot') {
                    textDiv.innerHTML = marked.parse(text); 
                    
                    textDiv.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                    
                    const preTags = textDiv.querySelectorAll('pre');
                    preTags.forEach(pre => {
                        const copyBtn = document.createElement('button');
                        copyBtn.innerText = 'Copy';
                        copyBtn.className = 'copy-btn';
                        
                        copyBtn.onclick = () => {
                            const codeText = pre.querySelector('code').innerText;
                            navigator.clipboard.writeText(codeText);
                            copyBtn.innerText = 'Copied!';
                            setTimeout(() => copyBtn.innerText = 'Copy', 2000);
                        };
                        pre.appendChild(copyBtn);
                    });
                } else {
                    textDiv.innerText = text;
                }
                msgDiv.appendChild(textDiv);
            }
            
            chatBox.insertBefore(msgDiv, loadingIndicator);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const loadingContainer = document.getElementById('loading-indicator');
            loadingContainer.style.display = 'flex'; 
            scrollToBottom();
        }

        function hideLoading() {
            const loadingContainer = document.getElementById('loading-indicator');
            loadingContainer.style.display = 'none'; 
        }

        async function processInput() {
            const inputField = document.getElementById('user-input');
            const rawText = inputField.value.trim();
            
            // UPDATE: Agar na text hai aur na photo, toh return maro
            if (!rawText && !base64Image) return;

            // 1. Show User Message (Text aur Image dono agar hain)
            appendMessage(rawText, 'user', base64Image);
            
            // Payload banaya backend bhejne ke liye
            const requestData = { message: rawText };
            if (base64Image) {
                requestData.image = base64Image;
            }

            // Input clear kiya bhejne ke baad
            inputField.value = '';
            removeImage();

            // 2. Direct AI API Call
            showLoading(); 
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const data = await response.json();
                hideLoading(); 
                appendMessage(data.reply, 'bot');
                
            } catch (error) {
                hideLoading();
                appendMessage("Abe tera Python server band pada hai. Check karle.", 'bot');
            }
        }
    </script>
</body>
</html>
